services:
  strapi:
    image: node:22-bookworm
    working_dir: /app
    command: >
      sh -lc "npm install && npm run develop"
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      HOST: "0.0.0.0"
      PORT: "1337"
      PUBLIC_URL: ${STRAPI_PUBLIC_URL:-http://localhost:1337}
      DATABASE_CLIENT: "sqlite"
      DATABASE_FILENAME: ".tmp/data.db"
      APP_KEYS: ${STRAPI_APP_KEYS:-devKeyA,devKeyB,devKeyC,devKeyD}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:-dev-api-token-salt}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:-dev-admin-jwt-secret}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT:-dev-transfer-token-salt}
      JWT_SECRET: ${STRAPI_JWT_SECRET:-dev-jwt-secret}
      ENCRYPTION_KEY: ${STRAPI_ENCRYPTION_KEY:-dev-encryption-key-32-chars-long}
    volumes:
      - ./sibklimat-strapi:/app
      - strapi_node_modules:/app/node_modules
      - strapi_cache:/app/.cache
      - strapi_build:/app/build
      - strapi_db:/app/.tmp
      - strapi_dev_uploads:/app/public/uploads

  frontend:
    image: node:22-bookworm
    working_dir: /app
    command: >
      sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      NUXT_TELEMETRY_DISABLED: "1"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NUXT_PUBLIC_STRAPI_URL: ${NUXT_PUBLIC_STRAPI_URL:-http://localhost:1337}
    volumes:
      - ./sibklimatrus:/app
      - nuxt_node_modules:/app/node_modules
      - nuxt_build:/app/.nuxt
    depends_on:
      - strapi

volumes:
  nuxt_node_modules:
  nuxt_build:
  strapi_node_modules:
  strapi_cache:
  strapi_build:
  strapi_db:
  strapi_dev_uploads:
